name: Deploy to GitHub Pages

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. pnpm 버전을 명시해서 설치해줘야 에러가 안 납니다 (추가된 부분)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install, build, and upload
        uses: withastro/action@v2
        with:
          path: .
          node-version: 20
          # 2. 여기를 npm에서 pnpm으로 바꿨습니다. (수정된 부분)
          package-manager: pnpm 

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
name: "Docker Security Scan"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Docker 이미지 빌드 (검사용)
      - name: Build Docker image
        run: docker build -t my-blog-image .

      # 2. Trivy로 이미지 취약점 스캔
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-blog-image'
          format: 'table'
          exit-code: '1' # 취약점이 발견되면 빌드 실패 처리 (선택 사항)
          severity: 'CRITICAL,HIGH' # 치명적이고 높은 위험만 보고
          ignore-unfixed: true